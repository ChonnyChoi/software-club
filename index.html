<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>감성 할 일 캘린더</title>
 
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4ede4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
 
    .container {
        width: 900px;
        background: #fffaf5;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
 
    h1 {
        text-align: center;
        color: #7a5c3e;
        margin-bottom: 25px;
    }
 
    .input-box {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }
 
    input, button {
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
    }
 
    input[type="date"] {
        background-color: #f7efe5;
    }
 
    input[type="text"] {
        flex: 1;
        background-color: #f7efe5;
    }
 
    button {
        background-color: #c8a27a;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }
 
    button:hover {
        background-color: #b48b63;
        transform: scale(1.03);
    }
 
    .calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
    }
 
    .day-name {
        text-align: center;
        font-weight: bold;
        color: #8b6f47;
        padding-bottom: 10px;
    }
 
    .day {
        background-color: #f8f1e8;
        min-height: 110px;
        border-radius: 15px;
        padding: 10px;
        position: relative;
        box-shadow: inset 0 0 3px rgba(0,0,0,0.05);
    }
 
    .date-number {
        font-weight: bold;
        color: #7a5c3e;
        margin-bottom: 8px;
    }
 
    .task {
        background-color: #d8b894;
        color: white;
        padding: 5px 8px;
        border-radius: 8px;
        margin-top: 5px;
        font-size: 13px;
        word-break: break-word;
    }
</style>
</head>
 
<body>
 
<div class="container">
 
    <h1>📅 나의 감성 할 일 캘린더</h1>
 
    <div class="input-box">
<input type="date" id="date">
<input type="text" id="todo" placeholder="할 일을 입력하세요">
<button onclick="addTask()">추가</button>
</div>
 
    <div class="calendar">
 
        <div class="day-name">일</div>
<div class="day-name">월</div>
<div class="day-name">화</div>
<div class="day-name">수</div>
<div class="day-name">목</div>
<div class="day-name">금</div>
<div class="day-name">토</div>
 
        <!-- 날짜 칸 -->
<script>
            for(let i=1; i<=31; i++){
                document.write(`
<div class="day" id="day-${i}">
<div class="date-number">${i}</div>
</div>
                `);
            }
</script>
 
    </div>
</div>
 
<script>
function addTask() {
 
    const dateValue = document.getElementById("date").value;
    const todo = document.getElementById("todo").value;
 
    if(dateValue === "" || todo === "") {
        alert("날짜와 할 일을 입력하세요!");
        return;
    }
 
    const date = new Date(dateValue);
    const day = date.getDate();
 
    const taskDiv = document.createElement("div");
    taskDiv.className = "task";
    taskDiv.innerText = "✔ " + todo;
 
    document.getElementById(`day-${day}`).appendChild(taskDiv);
 
    document.getElementById("todo").value = "";
}
</script>
 
</body>
</html>
