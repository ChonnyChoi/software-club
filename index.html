<script>
 
  const calendar = document.getElementById("calendar");
 
  let selectedDay = 1;
 
  const tasks = {};
 
  // 현재 날짜 가져오기
 
  const today = new Date().getDate();
 
  // 달력 생성
 
  for(let i=1;i<=31;i++){
 
    const day=document.createElement("div");
 
    day.classList.add("day");
 
    // 오늘 날짜 기본 선택
 
    if(i===today){
      day.classList.add("selected");
      selectedDay = today;
    }
 
    day.textContent=i;
 
    day.dataset.day=i;
 
    day.onclick=function(){
 
      document.querySelectorAll(".day").forEach(d=>{
        d.classList.remove("selected");
      });
 
      day.classList.add("selected");
 
      selectedDay=i;
 
      document.getElementById("selectedDate").textContent=
      `선택한 날짜 : 5월 ${i}일`;
 
      renderTasks();
 
    }
 
    calendar.appendChild(day);
 
  }
 
  // 초기 날짜 표시
 
  document.getElementById("selectedDate").textContent =
  `선택한 날짜 : 5월 ${today}일`;
 
  // 할 일 추가
 
  function addTask(){
 
    const input=document.getElementById("taskInput");
 
    const text=input.value.trim();
 
    if(text===""){
      alert("할 일을 입력하세요!");
      return;
    }
 
    if(!tasks[selectedDay]){
      tasks[selectedDay]=[];
    }
 
    tasks[selectedDay].push({
      text:text,
      completed:false
    });
 
    input.value="";
 
    renderTasks();
 
    updateCalendarStatus();
 
  }
 
  // 할 일 렌더링
 
  function renderTasks(){
 
    const list=document.getElementById("taskList");
 
    list.innerHTML="";
 
    const currentTasks=tasks[selectedDay] || [];
 
    let completed=0;
 
    currentTasks.forEach((task,index)=>{
 
      const li=document.createElement("li");
 
      const left=document.createElement("div");
 
      left.className="left";
 
      const checkbox=document.createElement("input");
 
      checkbox.type="checkbox";
 
      checkbox.checked=task.completed;
 
      const span=document.createElement("span");
 
      span.textContent=task.text;
 
      if(task.completed){
        span.classList.add("completed");
        completed++;
      }
 
      checkbox.onchange=function(){
 
        task.completed=checkbox.checked;
 
        renderTasks();
 
        updateCalendarStatus();
 
      }
 
      const deleteBtn=document.createElement("button");
 
      deleteBtn.textContent="삭제";
 
      deleteBtn.className="delete-btn";
 
      deleteBtn.onclick=function(){
 
        currentTasks.splice(index,1);
 
        renderTasks();
 
        updateCalendarStatus();
 
      }
 
      left.appendChild(checkbox);
 
      left.appendChild(span);
 
      li.appendChild(left);
 
      li.appendChild(deleteBtn);
 
      list.appendChild(li);
 
    });
 
    // 통계
 
    const total=currentTasks.length;
 
    const remaining=total-completed;
 
    const percent=
    total===0 ? 0 : Math.round((completed/total)*100);
 
    document.getElementById("completedCount").textContent=
    completed;
 
    document.getElementById("totalCount").textContent=
    total;
 
    document.getElementById("remainingText").textContent=
    `남은 과제 ${remaining}개`;
 
    document.getElementById("progressText").textContent=
    `진행률 ${percent}%`;
 
    document.getElementById("progressBar").style.width=
    `${percent}%`;
 
  }
 
  // 캘린더 상태 업데이트
 
  function updateCalendarStatus(){
 
    document.querySelectorAll(".day").forEach(day=>{
 
      day.classList.remove(
        "status-red",
        "status-yellow",
        "status-green"
      );
 
      const date = Number(day.dataset.day);
 
      const currentTasks = tasks[date];
 
      // 과제 없으면 표시 안함
 
      if(!currentTasks || currentTasks.length===0){
        return;
      }
 
      // 오늘 날짜 이상은 표시 안함
      // (오늘 포함 기본색 유지)
 
      if(date >= today){
        return;
      }
 
      const total = currentTasks.length;
 
      const completed = currentTasks.filter(
        task => task.completed
      ).length;
 
      const percent = (completed / total) * 100;
 
      // 100% 완료 → 초록
 
      if(percent === 100){
 
        day.classList.add("status-green");
 
      }
 
      // 50% 이상 → 노랑
 
      else if(percent >= 50){
 
        day.classList.add("status-yellow");
 
      }
 
      // 50% 미만 → 빨강
 
      else{
 
        day.classList.add("status-red");
 
      }
 
    });
 
  }
 
</script>
